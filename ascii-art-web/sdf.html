<style>
        html, body{
        height: 100%;
        background-color: rgb(255, 255, 255);
        overflow-x: hidden;
    }
    h1, h2 {
        text-align: center;
        font-family:  "Inconsolata", "Open Sans", sans-serif;
        font-weight: 500;
        font-size: 3em;
        color: rgb(41, 41, 41);
    }

    h1{
        margin-top: 100px;
        margin-bottom: 60px;
    }

    .input {
        float: left;
        width: 35%; 
        background-color: rgb(245, 245, 245);
        padding: 30px;
        padding-right: 40px;
    }
    .art {
        float: right;
        width: 65%; 
        background-color: rgb(255, 255, 255);
        
    }
    .input, .art {
        height: 100%;
        box-sizing: border-box;
    }
    #text {
        width: 97%;
        height: 100px;
        resize: none;
        padding-top: 10px;
    }

    .choose{
        font-family: "Josefin Sans";
        font-size: 1.8em;
        float: left;
        color: rgb(41, 41, 41);
        padding-top: 7px;
    }
    
    .selectBanner {
        font-family: "Josefin Sans";
        font-size: 1.3em;
        color: rgb(41, 41, 41);
        float:right;
        padding: 0.5em;
        border-radius: 5px;
        background-color: #ffffff;
        border: 1px solid rgb(101, 170, 248);
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
    }

    .bannerOption {
        background: #ffffff;
        color: rgb(41, 41, 41);
    }
    
    .submit {
        display: inline-block;
        outline: none;
        cursor: pointer;
        font-size: 16px;
        line-height: 20px;
        font-weight: 600;
        border-radius: 8px;
        padding: 13px 23px;
        border: 1px solid rgb(101, 170, 248);
        transition: box-shadow 0.2s ease 0s, -ms-transform 0.1s ease 0s, -webkit-transform 0.1s ease 0s, transform 0.1s ease 0s;
        background: #fff;
        color: #222222;
        :hover{
            border-color: rgb(0, 0, 0);
            background: #ffc2c2;
        }              
    }

    .ascii{
        overflow-y: auto;
        padding: 10px;
    }

    /* Background 
From codepen.io by Jelena Jovanovic */
@keyframes move_wave {
  0% {
    transform: translateX(0) translateZ(0) scaleY(1)
  }

  50% {
    transform: translateX(-25%) translateZ(0) scaleY(0.55)
  }

  100% {
    transform: translateX(-50%) translateZ(0) scaleY(1)
  }
}

.waveWrapper {
  overflow: hidden;
  margin: auto;
  z-index: -1;
}

.waveWrapperInner {
  width: 65%;
  overflow: hidden;
  height: 100%;
  bottom: 64.5%;
}

.bgTop {
  z-index: 15;
  opacity: 0.5;
}

.bgMiddle {
  z-index: 10;
  opacity: 0.75;
}

.bgBottom {
  z-index: 5;
}

.wave {
  position: absolute;
  left: 0;
  width: 200%;
  height: 100%;
  background-repeat: repeat no-repeat;
  background-position: 0 bottom;
  transform-origin: center bottom;
}

.waveTop {
  background-size: 50% 100px;
}

.waveAnimation .waveTop {
  animation: move-wave 3s;
  -webkit-animation: move-wave 3s;
  -webkit-animation-delay: 1s;
  animation-delay: 1s;
}

.waveMiddle {
  background-size: 50% 120px;
}

.waveAnimation .waveMiddle {
  animation: move_wave 10s linear infinite;
}

.waveBottom {
  background-size: 50% 100px;
}

.waveAnimation .waveBottom {
  animation: move_wave 15s linear infinite;
}


</style>
